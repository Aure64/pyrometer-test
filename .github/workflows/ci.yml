name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*", "*seoul*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: yarn

      - name: Backend install + build
        run: |
          yarn --cwd backend install --frozen-lockfile
          NODE_ENV=development yarn --cwd backend build
      - name: Validate Baker octezVersion field exists
        run: |
          grep -n "octezVersion" backend/dist/api/graphql/Baker.js

      - name: UI install + build
        run: |
          yarn --cwd ui install --frozen-lockfile
          yarn --cwd ui build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            backend/dist/**
            ui/dist/**

  package-deb:
    name: Build .deb (if packaging files present)
    needs: build
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.detect.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect packaging files
        id: detect
        run: |
          if [ -f backend/debian/control ] && [ -f builddeb.dockerfile ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.detect.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (tagged with package version)
        if: steps.detect.outputs.present == 'true'
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          docker build -t pyrometer:$VERSION -f Dockerfile .

      - name: Login to GHCR
        if: steps.detect.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        if: steps.detect.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/')
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag pyrometer:$VERSION $IMAGE:$VERSION
          docker tag pyrometer:$VERSION $IMAGE:latest
          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

      - name: Build .deb with builddeb.dockerfile
        if: steps.detect.outputs.present == 'true'
        run: |
          docker build -t pyrometer-deb:$VERSION \
            --build-arg VERSION=$VERSION \
            -f builddeb.dockerfile .

      - name: Extract .deb artifact
        if: steps.detect.outputs.present == 'true'
        run: |
          cid=$(docker create pyrometer-deb:$VERSION)
          mkdir -p deb
          docker cp "$cid":/build/. ./deb/
          docker rm "$cid"
          ls -la deb

      - name: Upload .deb artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: deb/*.deb

      - name: Extract universal tarball from Docker image
        if: steps.detect.outputs.present == 'true'
        run: |
          cid=$(docker create pyrometer:$VERSION)
          mkdir -p tarball/pyrometer
          docker cp "$cid":/opt/pyrometer/dist tarball/pyrometer/dist
          docker cp "$cid":/opt/pyrometer/ui tarball/pyrometer/ui
          docker cp "$cid":/opt/pyrometer/node_modules tarball/pyrometer/node_modules
          docker cp "$cid":/opt/pyrometer/package.json tarball/pyrometer/package.json
          docker cp "$cid":/usr/bin/pyrometer tarball/pyrometer/pyrometer
          docker rm "$cid"
          tar czf pyrometer-${VERSION}.tar.gz -C tarball pyrometer
          ls -lh pyrometer-${VERSION}.tar.gz

      - name: Upload tarball artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: pyrometer-*.tar.gz

  release:
    name: Release (attach .deb + tarball)
    needs: package-deb
    if: needs.package-deb.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb
          path: release
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: tarball
          path: release
      - name: Collect release files
        id: filter
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          DEB_FILE=$(ls release/pyrometer_${VERSION}_all.deb 2>/dev/null || echo "")
          if [ -z "$DEB_FILE" ]; then
            echo "WARNING: pyrometer_${VERSION}_all.deb not found, using first .deb"
            DEB_FILE=$(ls release/*.deb | head -1)
          fi
          TARBALL=release/pyrometer-${VERSION}.tar.gz
          echo "Found .deb: $DEB_FILE"
          echo "Found tarball: $TARBALL"
          ls -lh release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/pyrometer_${{ env.VERSION }}_all.deb
            release/pyrometer-${{ env.VERSION }}.tar.gz
          generate_release_notes: true


